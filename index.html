<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chinese Final 模拟卷</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: #222;
      background: #fff;
      padding: 16px 20px 32px;
      max-width: 800px;
      margin: 0 auto;
    }
    header {
      border-bottom: 1px solid #ccc;
      padding-bottom: 12px;
      margin-bottom: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header p { color: #666; font-size: 13px; margin-top: 4px; }
    .stats { margin-top: 8px; font-size: 13px; color: #666; }
    .stats span { margin-right: 16px; }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    nav button {
      font-family: inherit;
      font-size: 13px;
      padding: 4px 10px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      cursor: pointer;
    }
    nav button.active {
      background: #333;
      color: #fff;
      border-color: #333;
    }
    .section { display: none; }
    .section.active { display: block; }
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .section-desc { color: #666; font-size: 13px; margin-bottom: 8px; }
    .section-wish {
      color: #c00;
      font-size: 13px;
      margin-bottom: 12px;
      padding: 6px 10px;
      background: #fff8f8;
      border-left: 3px solid #c00;
    }
    .section-tools { margin-bottom: 16px; }
    .question {
      border: 1px solid #ddd;
      padding: 12px;
      margin-bottom: 12px;
    }
    .q-num { color: #666; margin-right: 6px; }
    .q-prompt { margin-bottom: 8px; }
    .dictation-line { margin-bottom: 4px; line-height: 2; }
    .blank-input {
      display: inline-block;
      min-width: 60px;
      max-width: 100%;
      font-family: inherit;
      font-size: 14px;
      padding: 2px 6px;
      border: none;
      border-bottom: 2px solid #c00;
      background: #fff8f8;
      vertical-align: baseline;
    }
    .dot-char { color: #c00; text-decoration: underline; font-weight: 600; }
    textarea, input[type="text"] {
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      padding: 6px 8px;
      border: 1px solid #ccc;
    }
    textarea { min-height: 60px; resize: vertical; }
    .actions { margin-top: 8px; }
    .btn {
      font-family: inherit;
      font-size: 13px;
      padding: 4px 12px;
      margin-right: 6px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      cursor: pointer;
    }
    .btn-check { background: #333; color: #fff; border-color: #333; }
    .feedback { margin-top: 8px; font-size: 13px; display: none; }
    .feedback.show { display: block; }
    .feedback.correct { color: #060; }
    .feedback.wrong { color: #900; }
    .answer-text { color: #c00; white-space: pre-wrap; margin-top: 4px; }
    .ref-block { border: 1px solid #ddd; padding: 12px; }
    .ref-block h4 { font-size: 14px; margin-bottom: 8px; }
    .ref-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 0;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }
    .ref-item:last-child { border-bottom: none; }
    .ref-meaning { color: #c00; white-space: nowrap; }
    .long-answer textarea { min-height: 100px; }
    footer { margin-top: 24px; font-size: 12px; color: #999; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>Chinese Final 模拟卷</h1>
    <p>答案文字一致即可（标点符号差异不计）· 答错将显示标红答案</p>
    <div class="stats">
      <span id="stat-total">共 0 题</span>
      <span id="stat-done">已答 0</span>
      <span id="stat-right">正确 0</span>
    </div>
  </header>

  <nav id="nav"></nav>
  <main id="main"></main>
  <footer>基于 Chinese Final.pdf · 本地模拟练习</footer>

        items: [

          { q: "试析本文在论证上的艺术特色", a: '本文所运用的论证方法主要是比喻论证和对比论证。文中用了大量生动的比喻，借以阐发治国安民的思想，言简意赅，具有很强的说服力。如文章开篇谈论治国要注重"积其德义"这一根本原则时，从两个方面比喻论证，即"木之长者，必固其根本"和"流之远者，必浚其泉源"，"固其根本"是树木长得高的必要条件，而"浚其泉源"也是流水流得长远的前提，运用自然中的现象类比治国的原则，浅显易懂而又生动形象。同样，魏征以水可以载舟也可以覆舟来比喻人民的力量的重要性，至今人们还记忆犹新。\n文中正反对比论证，加强了说服力。正反对比论证集中在一、二自然段，正反对比，使被说明的道理突出来了。如"求木之长者，必固其根本"，而从反面来说"根不固而求木之长"，"知其不可"，因此，根本与长的关系自然而然被人们接受了。再有第二段中引用历史的教训来劝戒太宗时，也注意了正反对比论证，"善始者实繁，克终者盖寡"。', long: true }
        ]

      dots_da: {
        title: "加点字 · 答司马谏议书",

          { phrase: "以兴利除弊", char: "以", answer: "表目的，来" },
          { phrase: "以膏泽斯民", char: "以", answer: "表目的，来" },
          { phrase: "士大夫多以不恤国事", char: "以", answer: "把" },
          { phrase: "欲出力助上以抗之", char: "以", answer: "表目的，来" },
          { phrase: "而议事每不合", char: "事", answer: "事情" },
          { phrase: "如曰今日当一切不事事", char: "事", charIndex: 0, answer: "做（事）" },

          { phrase: "所操之术多异故也", char: "故", answer: "缘故" },
          { phrase: "故今具道所以", char: "故", answer: "所以" },
          { phrase: "不为侵官", char: "为", answer: "是" },
          { phrase: "未能助上大有为", char: "为", answer: "作为" },
          { phrase: "为天下理财", char: "为", answer: "替" },
          { phrase: "同俗自媚于众为善", char: "为", answer: "当作" },
          { phrase: "则众何为而不汹汹然", char: "为", answer: "因为" },
          { phrase: "守前所为而已", char: "为", answer: "做" },
          { phrase: "则众何为而不汹汹然", char: "何", answer: "那么" },
          { phrase: "某则以谓", char: "则", answer: "却" },
          { phrase: "则固前知其如此也", char: "则", answer: "那么" },
          { phrase: "议法度而修之于朝廷", char: "度", answer: "制度" },
          { phrase: "不为怨者故改其度", char: "度", answer: "计划" },
          { phrase: "度义而后动", char: "度", answer: "考虑" }
        ]
      },
      translate_da: {
        title: "翻译 · 答司马谏议书",
        desc: "将下列句子翻译成现代汉语，须与参考答案完全相同。",
        items: [
          { q: "至于怨诽之多，则固前知其如此也。", a: "至于天下对我的怨恨非议这么多，那是我本来预先料到会这样的。" },
          { q: "如曰今日当一切不事事，守前所为而已，则非某之所敢知。", a: "如果您说我现在应该不做事，无所作为，守着以前的成法就行了，那么这就不是我敢领教的了。" },
          { q: "无由会晤，不任区区向往之至。", a: "没有缘由见面，内心不胜仰慕至极。" },
          { q: "故今具道所以，冀君实或见恕也。", a: "所以现在详细地说出我的理由，希望您或许能够原谅我吧。" }
        ]
      },
      questions_da: {

        desc: "简答题，答案须与参考答案完全相同。",
        items: [

          { q: "王安石对变法的立场和态度是怎么样的？", a: "王安石不把反对放在心上，坚持变法，义无反顾。" },
          { q: "第二段结构？", a: "（1）定原则——名实相符\n（2）树靶子——五条罪名\n（3）驳罪名——名实不符\n（4）表心理——早有预期（不惧恶名）", long: true },
          { q: "第三段结构？", a: "（1）分析怨谤原因——揭露本质\n（2）举盘庚之迁的例子类比\n（3）两个假设句子表态度——不畏怨谤", long: true }
        ]

    const SECTION_WISHES = [
      "祝语文考试顺利！默写一字不错，下笔如有神！",
      "加油！加点字释义记牢，考试稳拿分！",
      "祝语文考试顺利！翻译流畅准确，自信作答！",
      "沉着应试，简答题思路清晰，祝你高分！",
      "祝语文考试顺利！答司马谏议书你能行！",
      "虚词辨析多练几遍，考场一定没问题！",
      "祝语文考试顺利！翻译拿满分，加油！",
      "最后一关，坚持住，祝你语文考试圆满成功！"
    ];

    const state = {};
    let totalQuestions = 0;

    function normalize(s) {
      return s
        .replace(/\s+/g, "")
        .replace(/[\u201C\u201D\u2018\u2019""'']/g, "")
        .replace(/[，,。．；;：:！!？?、—\-…·《》「」『』【】（）()\[\]{}]/g, "")
        .trim();
    }

    function tokenizeSentence(sentence) {
      const tokens = [];
      const re = /([\u4e00-\u9fff]+)|([，。！？；：、])/g;
      let m;
      while ((m = re.exec(sentence)) !== null) {
        tokens.push({
          type: m[1] ? "text" : "punct",
          value: m[1] || m[2]
        });
      }
      return tokens;
    }

    function randomBlankFromSentence(sentence) {
      const tokens = tokenizeSentence(sentence);
      const blankable = tokens
        .map((token, index) => ({ token, index }))
        .filter(({ token }) => token.type === "text");
      const pick = blankable[Math.floor(Math.random() * blankable.length)];
      return {
        tokens,
        blankIndex: pick.index,
        answer: pick.token.value
      };
    }

    function renderDictationQuestions(section, sec, startNum) {
      section.querySelectorAll(".question").forEach(el => el.remove());
      sec.items.forEach((sentence, i) => {
        const num = startNum + i;
        const id = `q${num}`;
        section.appendChild(createFillBlankEl(id, num, randomBlankFromSentence(sentence)));
      });
    }

    function refreshDictation() {
      for (let i = 1; i <= DATA.dictation.items.length; i++) {
        delete state[`q${i}`];
      }
      renderDictationQuestions(
        document.getElementById("sec-dictation"),
        DATA.dictation,
        1
      );
      updateStats();
    }

    function highlightChar(phrase, char) {
      const idx = phrase.indexOf(char);
      if (idx === -1) return phrase;
      return phrase.slice(0, idx) +
        `<span class="dot-char">${char}</span>` +
        phrase.slice(idx + char.length);
    }

    function highlightCharOccurrence(phrase, char, occurrence) {
      let pos = 0;
      for (let found = 0; found <= occurrence; found++) {
        const idx = phrase.indexOf(char, pos);
        if (idx === -1) return phrase;
        if (found === occurrence) {
          return phrase.slice(0, idx) +
            `<span class="dot-char">${char}</span>` +
            phrase.slice(idx + char.length);
        }
        pos = idx + char.length;
      }
      return phrase;
    }

    function countQuestions() {
      let n = 0;
      for (const key of Object.keys(DATA)) {
        n += DATA[key].items.length;
      }
      return n;
    }

    function updateStats() {
      const keys = Object.keys(state);
      const done = keys.filter(k => state[k].checked).length;
      const right = keys.filter(k => state[k].checked && state[k].correct).length;
      document.getElementById("stat-total").textContent = `共 ${totalQuestions} 题`;
      document.getElementById("stat-done").textContent = `已答 ${done}`;
      document.getElementById("stat-right").textContent = `正确 ${right}`;
    }

    function checkAnswer(id, userAns, correctAns) {
      const ok = normalize(userAns) === normalize(correctAns);
      state[id] = { checked: true, correct: ok };
      const fb = document.getElementById(`fb-${id}`);
      fb.className = `feedback show ${ok ? "correct" : "wrong"}`;
      if (ok) {
        fb.innerHTML = "✓ 回答正确！";
      } else {
        fb.innerHTML = `<div class="answer-label">✗ 回答错误，参考答案：</div><div class="answer-text">${escapeHtml(correctAns).replace(/\n/g, "<br>")}</div>`;
      }
      updateStats();
    }

    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function renderDotPrompt(item) {
      if (item.charIndex != null) {
        return highlightCharOccurrence(item.phrase, item.char, item.charIndex);
      }
      return highlightChar(item.phrase, item.char);
    }

    function buildSections() {
      const nav = document.getElementById("nav");
      const main = document.getElementById("main");
      let qIndex = 0;

      Object.entries(DATA).forEach(([key, sec], si) => {
        const btn = document.createElement("button");
        btn.textContent = sec.title;
        btn.dataset.section = key;
        if (si === 0) btn.classList.add("active");
        btn.onclick = () => switchSection(key);
        nav.appendChild(btn);

        const section = document.createElement("div");
        section.className = `section${si === 0 ? " active" : ""}`;
        section.id = `sec-${key}`;
        section.innerHTML = `<h2 class="section-title">${sec.title}</h2><p class="section-wish">${SECTION_WISHES[si] || "祝语文考试顺利，加油！"}</p><p class="section-desc">${sec.desc}</p>`;

        if (sec.fillBlank) {
          if (sec.randomBlank) {
            const tools = document.createElement("div");
            tools.className = "section-tools";
            tools.innerHTML = `<button class="btn" type="button" onclick="refreshDictation()">重新随机挖空</button>`;
            section.appendChild(tools);
            renderDictationQuestions(section, sec, 1);
            qIndex += sec.items.length;
          } else {
            sec.items.forEach((item, i) => {
              qIndex++;
              const id = `q${qIndex}`;
              section.appendChild(createFillBlankEl(id, qIndex, item));
            });
          }
        } else if (key.startsWith("dots_") || key === "xuci") {
          sec.items.forEach((item, i) => {
            qIndex++;
            const id = `q${qIndex}`;
            const label = key === "xuci" ? "加点虚词" : "加点字";
            const prompt = `解释 "${renderDotPrompt(item)}" 中${label}的含义：`;
            section.appendChild(createQuestionEl(id, qIndex, prompt, item.answer, false, true));
          });
        } else {
          sec.items.forEach((item, i) => {
            qIndex++;
            const id = `q${qIndex}`;
            section.appendChild(createQuestionEl(id, qIndex, item.q, item.a, !!item.long));
          });
        }

        main.appendChild(section);
      });

      totalQuestions = countQuestions();
      updateStats();
    }

    function createFillBlankEl(id, num, blank) {
      const div = document.createElement("div");
      div.className = "question";
      const width = Math.min(Math.max(blank.answer.length * 16, 80), 480);
      let line = `<span class="q-num">${num}.</span>`;
      blank.tokens.forEach((token, i) => {
        if (i === blank.blankIndex) {
          line += `<input type="text" class="blank-input" id="input-${id}" placeholder="填写此处" style="width:${width}px">`;
        } else {
          line += escapeHtml(token.value);
        }
      });
      div.innerHTML = `
        <div class="q-prompt dictation-line">${line}</div>
        <div class="actions">
          <button class="btn btn-check" onclick="doCheck('${id}')">提交</button>
          <button class="btn btn-clear" onclick="doClear('${id}')">清空</button>
        </div>
        <div class="feedback" id="fb-${id}"></div>
      `;
      div.dataset.answer = blank.answer;
      div.querySelector("input").addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); doCheck(id); }
      });
      return div;
    }

    function createQuestionEl(id, num, prompt, answer, isLong, isHtml) {
      const div = document.createElement("div");
      div.className = `question${isLong ? " long-answer" : ""}`;
      const inputTag = isLong
        ? `<textarea id="input-${id}" placeholder="请输入答案…"></textarea>`
        : `<input type="text" id="input-${id}" placeholder="请输入答案…">`;

      div.innerHTML = `
        <div class="q-prompt"><span class="q-num">${num}</span>${isHtml ? prompt : escapeHtml(prompt)}</div>
        ${inputTag}
        <div class="actions">
          <button class="btn btn-check" onclick="doCheck('${id}')">提交</button>
          <button class="btn btn-clear" onclick="doClear('${id}')">清空</button>
        </div>
        <div class="feedback" id="fb-${id}"></div>
      `;
      div.dataset.answer = answer;
      div.dataset.qid = id;

      div.querySelector("textarea, input").addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey && e.target.tagName !== "TEXTAREA") {
          e.preventDefault();
          doCheck(id);
        }
      });

      return div;
    }

    function doCheck(id) {
      const input = document.getElementById(`input-${id}`);
      const qEl = input.closest(".question");
      checkAnswer(id, input.value, qEl.dataset.answer);
    }

    function doClear(id) {
      document.getElementById(`input-${id}`).value = "";
      const fb = document.getElementById(`fb-${id}`);
      fb.className = "feedback";
      fb.innerHTML = "";
      delete state[id];
      updateStats();
    }

    function initInputNavigation() {
      document.addEventListener("keydown", e => {
        if (e.key !== "ArrowDown" && e.key !== "ArrowUp") return;
        const el = e.target;
        if (!el.matches("input.blank-input, input[type='text'][id^='input-']")) return;
        const section = el.closest(".section");
        if (!section) return;
        const inputs = [...section.querySelectorAll("input.blank-input, input[type='text'][id^='input-']")];
        const i = inputs.indexOf(el);
        if (i < 0) return;
        const target = e.key === "ArrowDown" ? inputs[i + 1] : inputs[i - 1];
        if (target) {
          e.preventDefault();
          target.focus();
          target.select();
        }
      });
    }

    function switchSection(key) {
      document.querySelectorAll("nav button").forEach(b => {
        b.classList.toggle("active", b.dataset.section === key);
      });
      document.querySelectorAll(".section").forEach(s => {
        s.classList.toggle("active", s.id === `sec-${key}`);
      });
    }

    window.doCheck = doCheck;
    window.doClear = doClear;
    window.refreshDictation = refreshDictation;
    initInputNavigation();
    buildSections();
  </script>
</body>
</html>
